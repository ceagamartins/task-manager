<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>

<body>

    <div class="auth-container">

        <div class="card shadow auth-card p-4">

            <div class="text-center mb-4">
                <h3 class="fw-bold">Task Manager</h3>
                <small class="text-muted" id="authSubtitle">Entre na sua conta</small>
            </div>

            <div class="form-wrapper">

                <!-- LOGIN -->
                <form id="loginForm" class="auth-form active">
                    <div class="mb-3 input-group-custom">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" placeholder="Email" required>
                    </div>

                    <div class="mb-3 input-group-custom">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" placeholder="Senha" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-auth">
                            Entrar
                        </button>
                    </div>
                </form>

                <!-- REGISTER -->
                <form id="registerForm" class="auth-form">
                    <div class="mb-3 input-group-custom">
                        <i class="bi bi-person"></i>
                        <input type="text" class="form-control" placeholder="Nome" required>
                    </div>

                    <div class="mb-3 input-group-custom">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" placeholder="Email" required>
                    </div>

                    <div class="mb-3 input-group-custom">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" placeholder="Senha" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-auth">
                            Criar Conta
                        </button>
                    </div>
                </form>

            </div>

            <div class="text-center mt-4">
                <small>
                    <span id="toggleText">Não tem conta?</span>
                    <span class="fw-bold auth-toggle" id="toggleButton">
                        Criar conta
                    </span>
                </small>
            </div>

        </div>

    </div>

    <script src="/static/js/auth.js"></script>
</body>

</html>
